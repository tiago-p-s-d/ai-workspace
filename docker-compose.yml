services:
  db:
    image: mysql:8.0
    container_name: ai-assistant-db
    networks:
      - ai-network
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: ai-back
    networks:
      - ai-network
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ai-front
    networks:
      - ai-network
    command: ng serve --host 0.0.0.0 --port 4200 --poll 2000 
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.angular
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  db_data:

networks:
  ai-network:
    driver: bridge