<div class="chat-layout-container">

  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="btn-new-chat" (click)="handleNewChat()">
        <span class="icon">+</span>
        New Chat
      </button>
    </div>

    <nav class="history-navigation">
      @if (isLoading()) {
        <div class="skeleton-loader">
          <p>Loading history...</p>
        </div>
      } @else {
        @for (chat of chats(); track chat.id) {
          <div class="history-item">

            <a
              [routerLink]="['/chat', chat.id]"
              routerLinkActive="active"
              class="chat-link">
              <span class="chat-title">{{ chat.title || 'Untitled Chat' }}</span>
            </a>

            <button
              type="button"
              class="btn btn-danger btn-sm btn-delete"
              title="Excluir conversa"
              (click)="onDeleteChat($event, chat.id)">
              <i class="bi bi-trash"></i>
            </button>

          </div>
        } @empty {
          <div class="empty-state">
            <p>No recent conversations</p>
          </div>
        }
      }
    </nav>

    <!-- User Profile & Logout Footer -->
    <footer class="sidebar-footer">
      <div class="user-info" [title]="userEmail || ''">
        <div class="avatar-circle">
          {{ (userEmail ? userEmail.charAt(0) : 'U') }}
        </div>
        <span class="user-email">{{ userEmail  }}</span>
      </div>

      <button
        type="button"
        class="btn-logout"
        (click)="handleLogout()"
        title="Log out">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </footer>
  </aside>

  <main class="chat-viewport">
    <router-outlet></router-outlet>
  </main>

</div>
