<div class="chat-layout-container">

  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="btn-new-chat" (click)="handleNewChat()">
        <span class="icon">+</span> New Chat
      </button>
    </div>

    <nav class="history-navigation">
      @if (isLoading()) {
        <div class="skeleton-loader">
          <p>Loading history...</p>
        </div>
      } @else {
        @for (chat of chats(); track chat.id) {
          <div class="history-item-wrapper">
            <a 
              [routerLink]="['/chat', chat.id]" 
              routerLinkActive="active" 
              class="history-item">
              <span class="chat-title">{{ chat.title }}</span>
            </a>

            <button 
              type="button" 
              class="btn-delete-chat" 
              title="Delete Chat" 
              (click)="onDeleteChat($event, chat.id)">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </div>
        } @empty {
          <div class="empty-state">
            <p>No recent conversations</p>
          </div>
        }
      }
    </nav>
  </aside>

  <main class="chat-viewport">
    <router-outlet></router-outlet>
  </main>
</div>
